name: Release

# Builds every platform and publishes a GitHub Release when a version tag is
# pushed (e.g. `git tag v1.0.0 && git push origin v1.0.0`). Can also be run
# manually from the Actions tab.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  FLUTTER_VERSION: 3.44.6

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      # Debug-signed unless android/key.properties is provided (see README).
      - run: flutter build apk --release
      - run: flutter build appbundle --release
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Package
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath ClassicLines-windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: ClassicLines-windows-x64.zip

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GTK toolchain
        run: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev clang cmake pkg-config
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Package
        run: tar -czf ClassicLines-linux-x64.tar.gz -C build/linux/x64/release/bundle .
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: ClassicLines-linux-x64.tar.gz

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      # Unsigned — a store/device-installable build needs signing certs (secrets).
      - run: flutter build ios --release --no-codesign
      - name: Package unsigned .ipa
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -R Runner.app Payload/Runner.app
          zip -r "$GITHUB_WORKSPACE/ClassicLines-ios-unsigned.ipa" Payload
      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: ClassicLines-ios-unsigned.ipa

  release:
    needs: [android, windows, linux, ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
